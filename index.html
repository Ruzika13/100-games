<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcadeOS | Multiplayer Platform</title>
    <!-- PeerJS for Serverless Online Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Our Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ARCADE OS</h1>
    <p style="color: #94a3b8; margin-top: 5px;">Multiplayer Gaming Platform</p>
</header>

<!-- HUB VIEW -->
<div id="hub-view" class="view active">
    <h2>🎮 Select a Game</h2>
    <div class="game-card">
        <div>
            <h3>Tic-Tac-Toe Ultimate</h3>
            <p style="color: #94a3b8; font-size: 14px;">Play vs AI (3 difficulties), Local, or Online via Room Code.</p>
        </div>
        <button class="btn" onclick="App.showView('game-ttt')">Play Now</button>
    </div>
    <div class="game-card" style="opacity: 0.5;">
        <div>
            <h3>Connect 4</h3>
            <p style="color: #94a3b8; font-size: 14px;">Coming in Phase 2...</p>
        </div>
        <button class="btn btn-secondary" disabled>Locked</button>
    </div>
</div>

<!-- TIC-TAC-TOE VIEW -->
<div id="game-ttt" class="view">
    <button class="btn btn-secondary" onclick="App.showView('hub-view')" style="margin-bottom: 20px;">← Back to Hub</button>
    
    <div class="mode-select" id="ttt-modes">
        <button class="btn" onclick="TicTacToe.start('ai-easy')">vs AI (Easy)</button>
        <button class="btn" onclick="TicTacToe.start('ai-hard')">vs AI (Hard)</button>
        <button class="btn" onclick="TicTacToe.start('ai-extreme')">vs AI (Very Hard)</button>
        <button class="btn" onclick="TicTacToe.start('local')">Local 2-Player</button>
        <button class="btn" onclick="TicTacToe.showOnlineMenu()">Online Multiplayer</button>
    </div>

    <!-- Online Menu -->
    <div id="online-menu" class="online-panel hidden">
        <h3>🌐 Online Multiplayer</h3>
        <div id="host-section">
            <p>Host a game and share this code:</p>
            <h2 id="room-code-display" style="color: var(--accent); letter-spacing: 3px;">---</h2>
            <button class="btn" onclick="App.hostGame()">Generate Code & Host</button>
        </div>
        <div style="margin: 15px 0; color: #64748b;">- OR -</div>
        <div id="join-section">
            <p>Enter room code to join:</p>
            <input type="text" id="join-code-input" maxlength="6" placeholder="ABC123">
            <button class="btn" onclick="App.joinGame()">Join</button>
        </div>
        <p id="online-status" style="color: #fbbf24; margin-top: 10px;"></p>
    </div>

    <div class="status-bar" id="status-text">Choose a mode to start</div>
    
    <div class="board" id="board">
        <!-- Cells generated by TicTacToe.js -->
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="TicTacToe.resetBoard()">Restart Game</button>
    </div>
</div>

<!-- Load Core App Logic -->
<script src="app.js"></script>
<!-- Load Game Specific Logic -->
<script src="games/tictactoe.js"></script>

</body>
</html>
